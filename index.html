<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My AR App</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.3.0/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    /* Loading screen */
    #loading {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: sans-serif; z-index: 999;
    }
    #loading p { margin-top: 16px; font-size: 14px; opacity: 0.7; }

    /* Hint text */
    #hint {
      position: fixed; bottom: 40px;
      width: 100%; text-align: center;
      color: white; font-family: sans-serif;
      font-size: 16px; font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      z-index: 998;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="loading">
    <h2>Loading AR1...</h2>
    <p>Please allow camera permission if asked</p>
  </div>

  <div id="hint">Scan the target image to see 3D model</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="myModel" src="./my-model.glb"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
    <a-entity light="type: directional; intensity: 1.5;" position="1 2 1"></a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-gltf-model
        src="#myModel"
        position="0 0 0"       
        rotation="0 0 0"       
        scale="0.1 0.1 0.1"   
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear;">
      </a-gltf-model>

    </a-entity>

  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const loadingScreen = document.getElementById('loading');
    const hintText = document.getElementById('hint');

    // Hide loading screen when camera environment is ready
    scene.addEventListener('arReady', () => {
      loadingScreen.style.display = 'none';
    });

    // Hide hint when image target is detected by the scanner
    const targetEntity = document.querySelector('[mindar-image-target]');
    targetEntity.addEventListener('targetFound', () => {
      hintText.style.display = 'none';
    });

    // Show hint again if camera loses tracking of the target image
    targetEntity.addEventListener('targetLost', () => {
      hintText.style.display = 'block';
    });
  </script>

</body>
</html>
