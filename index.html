<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>My AR App v0.3</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.3.0/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }

    /* Centered Custom Start UI Button */
    #startOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111827; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; text-align: center; font-family: -apple-system, sans-serif;
    }
    .start-btn {
      background: #2563eb; color: white; border: none; 
      padding: 16px 36px; font-size: 18px; font-weight: bold;
      border-radius: 30px; margin-top: 20px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }
    
    #hint {
      position: fixed; bottom: 40px; width: 100%; text-align: center;
      color: white; font-family: sans-serif; font-size: 16px; font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 998; display: none;
    }
  </style>
</head>
<body>

  <div id="startOverlay">
    <h2>AR Engine Ready</h2>
    <p style="opacity: 0.7; max-width: 280px; font-size: 14px; line-height: 1.4;">
      Tap below and select "Allow" when Safari asks for camera access permissions.
    </p>
    <button class="start-btn" id="startButton">START AR CAMERA</button>
  </div>

  <div id="hint">Point your camera at the target image</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: yes; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="myModel" src="./my-model.glb"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
    <a-entity light="type: directional; intensity: 1.5;" position="1 2 1"></a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target1" mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#myModel"
        position="0 0 0"       
        rotation="0 0 0"       
        scale="0.1 0.1 0.1"   
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear;">
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const startOverlay = document.getElementById('startOverlay');
    const startButton = document.getElementById('startButton');
    const hintText = document.getElementById('hint');
    const scene = document.querySelector('a-scene');

    startButton.addEventListener('click', () => {
      // Hide the start layer UI overlay
      startOverlay.style.display = 'none';
      hintText.style.display = 'block';

      // Safe, native initialization of MindAR inside the A-Frame ecosystem
      if (scene.hasLoaded) {
        scene.systems["mindar-image-system"].start();
      } else {
        scene.addEventListener('loaded', () => {
          scene.systems["mindar-image-system"].start();
        });
      }
    });

    // Tracking Event Triggers
    const targetEntity = document.getElementById('target1');
    targetEntity.addEventListener('targetFound', () => { hintText.style.display = 'none'; });
    targetEntity.addEventListener('targetLost', () => { hintText.style.display = 'block'; });
  </script>

</body>
</html>
